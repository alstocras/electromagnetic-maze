[plugin]

name="ButlerExportPlugin"
description="A Godot plugin that provides an interface for itch.io's butler utility in editor.
This plugin supports Godot v4.5 and higher.
This plugin requires a local copy of butler downloaded to the system in order to operate.[br]
Requires then NovaTools plugin as a dependency.
NovaTools does not need to be enabled for this plugin to function."
author="NovaDC"
version="v2.0.0.0"
script="plugin.gd"
